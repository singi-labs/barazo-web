name: Setup Barazo Web
description: Install pnpm/Node.js, cache and build lexicons, install dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Cache lexicons build
      id: lexicons-cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ../barazo-lexicons
        key: lexicons-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Clone and build barazo-lexicons
      if: steps.lexicons-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth 1 https://github.com/singi-labs/barazo-lexicons.git ../barazo-lexicons
        cd ../barazo-lexicons && pnpm install --ignore-scripts && pnpm run build

    - name: Clone and build barazo-plugins (frontend only)
      shell: bash
      run: |
        git clone --depth 1 https://github.com/singi-labs/barazo-plugins.git ../barazo-plugins
        cd ../barazo-plugins && pnpm install --ignore-scripts
        cd packages/plugin-signatures && npx tsc -p tsconfig.frontend.json

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Replace plugin symlinks for Turbopack compatibility
      shell: bash
      run: |
        LINK=node_modules/@barazo/plugin-signatures
        if [ -L "$LINK" ]; then
          TARGET=$(realpath "$LINK")
          rm "$LINK"
          cp -r "$TARGET" "$LINK"
        fi
